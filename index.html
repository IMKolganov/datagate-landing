<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DataGate</title>
  <meta name="description" content="DataGate – open-source OpenVPN and Xray ecosystem: clients for Windows, Android, iOS, server stack with REST API, web dashboard for management." />
  <meta name="theme-color" content="#0d1117" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script>
    (function () {
      var key = "datagate-theme";
      var saved = localStorage.getItem(key);
      var theme =
        saved === "light" || saved === "dark"
          ? saved
          : window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
      document.documentElement.setAttribute("data-theme", theme);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) {
        meta.setAttribute("content", theme === "light" ? "#ffffff" : "#0d1117");
      }
    })();
  </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
